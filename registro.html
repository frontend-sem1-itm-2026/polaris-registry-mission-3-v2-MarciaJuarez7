<!DOCTYPE html>
<html lang="es">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>Registro POLARIS</title>
        <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
        <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css">
        <link rel="stylesheet" href="CSS/styles.css">
    </head>

    <body class="registro-page">
        <!-- Navbar -->
        <nav class="navbar navbar-expand-lg navbar-dark bg-dark fixed-top">
            <div class="container">
                <a class="navbar-brand" href="#">
                    <i class="bi bi-rocket"></i> POLARIS
                </a>

                <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#menu">
                    <span class="navbar-toggler-icon"></span>
                </button>

                <div class="collapse navbar-collapse" id="menu">
                    <ul class="navbar-nav ms-auto">
                        <li class="nav-item"><a class="nav-link" href="index.html">INICIO</a></li>
                        <li class="nav-item"><a class="nav-link" href="#equipos">EQUIPOS</a></li>
                        <li class="nav-item"><a class="nav-link" href="#eventos">EVENTOS</a></li>
                    </ul>
                </div>
            </div>
        </nav>

                     <!-- Formulario -->
                    <section class="py-5">
                        <div class="container">
                        <h1 class="text-center mb-4 bi-rocket titulo-registroP"> REGISTRO POLARIS </h1>
                        <div class="row justify-content-center">
                            <div class="col-md-6">
                                <form class="card p-4 shadow">

                    <!-- Datos personales -->
                    <h5 class="mb-3">Datos personales</h5>

                    <div class="mb-3">
                        <label class="form-label">Nombre completo</label>
                        <input type="text" class="form-control" placeholder="Ingresa tu nombre" required>
                    </div>

                    <div class="mb-3">
                        <label class="form-label">Correo electrónico</label>
                        <input type="email" class="form-control" placeholder="correo@ejemplo.com" required>
                    </div>

                    <div class="mb-3">
                        <label class="form-label">Teléfono</label>
                        <input type="tel" class="form-control" placeholder="(xxx) xxx-xxxx" required>
                    </div>

                    <div class="mb-3">
                        <label class="form-label">Fecha de nacimiento</label>
                        <input type="date" class="form-control" required>
                    </div>
                
                    <div class="mb-3">
                        <label class="form-label">Fotografía actual</label>
                        <input type="file" class="form-control" accept="image/*">
                        <div class="form-text text-white">Sube una foto tipo perfil (JPG o PNG)</div>
                    </div> <hr>

                    <!-- Datos académicos -->
                    <h5 class="mb-3">Datos académicos</h5>

                    <div class="mb-3">
                        <label class="form-label">Institución</label>
                        <input type="text" class="form-control" placeholder="Nombre de tu institución" required>
                    </div>

                    <div class="mb-3">
                        <label class="form-label">Carrera</label>
                        <input type="text" class="form-control" placeholder="Ej. Ingeniería en Sistemas Computacionales" required>
                    </div>
                    
                    <div class="mb-3">
                        <label class="form-label">Semestre</label>
                        <select class="form-select" required>
                            <option selected disabled>Selecciona tu semestre</option>
                            <option>1er Semestre</option>
                            <option>2do Semestre</option>
                            <option>3er Semestre</option>
                            <option>4to Semestre</option>
                            <option>5to Semestre</option>
                            <option>6to Semestre</option>
                            <option>7mo Semestre</option>
                            <option>8vo Semestre</option>
                            <option>9no Semestre</option>
                            <option>10mo Semestre</option>
                            <option>11vo Semestre</option>
                            <option>12vo Semestre</option>
                        </select>
                    </div>

                    <!-- Perfil Polaris -->
                    <hr>
                    <h5 class="mb-3">Perfil Polaris</h5>
                    
                    <div class="mb-3">
                        <label class="form-label">Generación Polaris</label>
                        <input type="number" class="form-control" placeholder="Ej. 2024" min="2000" max="2100" required>
                    </div>

                <div class="mb-3">
                    <div class="form-group">
                        <label class="form-label">Proyecto o Equipo de Interés</label>

                        <div class="form-check">
                            <input class="form-check-input" type="checkbox" name="equipo" id="orbita" value="orbita">
                            <label class="form-check-label" for="orbita">Mentes en Órbita</label>
                        </div>
                        
                        <div class="form-check">
                            <input class="form-check-input" type="checkbox" name="equipo" id="polarix" value="polarix">
                            <label class="form-check-label" for="polarix">PolariX</label>
                        </div>
                        
                        <div class="form-check">
                            <input class="form-check-input" type="checkbox" name="equipo" id="hydro" value="hydro">
                            <label class="form-check-label" for="hydro">Hydronautas</label>
                        </div>

                        <div class="form-check">
                            <input class="form-check-input" type="checkbox" name="equipo" id="otro" value="otro">
                            <label class="form-check-label" for="otro">Otro</label>
                        </div>

                        <textarea class="form-control mt-2" rows="3" placeholder="Si tienes un proyecto en mente, escríbelo aquí"></textarea>
                    </div>
                </div>

                    <!-- Habilidades -->
                    <hr>
                    <h5 class="mb-3">Habilidades</h5>
                    <div class="mb-3">
                        <div class="form-group">
                            <label class="form-label">Selecciona tus áreas de dominio:</label>
                            <div class="checkbox-group">

                                <div class="form-check">
                                    <input class="form-check-input" type="checkbox" id="fprogramacion" name="habilidades" value="programacion">
                                    <label class="form-check-label" for="fprogramacion">Programación</label>
                                </div>

                                <div class="form-check">
                                    <input class="form-check-input" type="checkbox" id="felectronica" name="habilidades" value="electronica">
                                    <label class="form-check-label" for="felectronica">Electrónica</label>
                                </div>

                                <div class="form-check">
                                    <input class="form-check-input" type="checkbox" id="fcad" name="habilidades" value="cad">
                                    <label class="form-check-label" for="fcad">Diseño CAD</label>
                                </div>

                                <div class="form-check">
                                    <input class="form-check-input" type="checkbox" id="finvestigacion" name="habilidades" value="investigacion">
                                    <label class="form-check-label" for="finvestigacion">Investigación</label>
                                </div>

                                <div class="form-check">
                                    <input class="form-check-input" type="checkbox" id="fdivulgacion" name="habilidades" value="divulgacion">
                                    <label class="form-check-label" for="fdivulgacion">Divulgación</label>
                                </div>

                            </div>
                        </div>
                    </div>
                    
                    <!-- Seguimiento -->
                    <hr><h5 class="mb-3">Seguimiento</h5>

                    <div class="mb-3">
                        <label class="form-label">Institución o lugar de trabajo actual:</label>
                        <input type="text" class="form-control" placeholder="Ej. Universidad X o Empresa Y" required>
                    </div> 

                    <div class="mb-3">
                        <label class="form-label">Rol Actual</label>

                        <div class="form-check">
                            <input class="form-check-input" type="radio" name="rol" value="lider">
                            <label class="form-check-label">Líder de equipo</label>
                        </div>

                        <div class="form-check">
                            <input class="form-check-input" type="radio" name="rol" value="participante">
                            <label class="form-check-label">Participante</label>
                        </div>

                        <div class="form-check">
                            <input class="form-check-input" type="radio" name="rol" value="mentor">
                            <label class="form-check-label">Mentor</label>
                        </div>

                        <div class="form-check">
                            <input class="form-check-input" type="radio" name="rol" value="coordinador">
                            <label class="form-check-label">Coordinador</label>
                        </div>

                        <div class="form-check">
                            <input class="form-check-input" type="radio" name="rol" value="colaborador">
                            <label class="form-check-label">Colaborador</label>
                        </div>

                    </div> 

                    <div class="mb-3">
                        <label class="form-label">¿Deseas seguir colaborando con POLARIS?</label>

                        <div class="form-check">
                            <input class="form-check-input" type="radio" name="interes" value="si">
                            <label class="form-check-label">Sí</label>
                        </div>

                        <div class="form-check">
                            <input class="form-check-input" type="radio" name="interes" value="no">
                            <label class="form-check-label">No</label>
                        </div>
                    </div> 
                    <div class="d-grid">
                        <button type="submit" class="btn btn-primary">Enviar registro 🚀</button>
                    </div>
                </form>
            </div>
        </div>
    </div>
</section>

        <!-- Footer -->
        <footer class="bg-dark text-white text-center py-3">
            <p class="mb-0">© 2026 Programa POLARIS - Instituto Tecnológico de Matamoros.</p>
            <div class="d-flex gap-3 justify-content-center">
                <a href="https://www.facebook.com/TecNM.Matamoros" class="text-white fs-3">
                    <i class="bi bi-facebook"></i>
                </a>
            </div>
        </footer>

        <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>

    </body>
</html>
